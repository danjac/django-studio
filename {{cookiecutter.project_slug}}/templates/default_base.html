{% load i18n static %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE }}">
  <head>
    {% block title %}{% title_tag %}{% endblock title %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% meta_tags %}
    <link rel="stylesheet" href="{% static 'app.css' %}" />
    <script src="{% static 'vendor/htmx-2.0.8.min.js' %}" defer></script>
    <script src="{% static 'vendor/alpine-3.15.2.min.js' %}" defer></script>
  </head>
  <body>
    <div
      id="hx-indicator"
      x-data="{ width: 0 }"
      x-init="
        setInterval(() => {
          if ($el.classList.contains('htmx-request')) {
            width = width + (Math.random() / 100) + 1;
            width = width > 30 ? -30 : width;
          } else {
            width = 0;
          }
          $el.style.width = width > 0 ? `${10 + width * 90}%` : '0px';
        }, 36);
      "
    ></div>
    {% if messages %}
      {% include "messages.html" %}
    {% endif %}
    {% cookie_banner %}
    {% include "navbar.html" %}
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      {% block content %}
      {% endblock content %}
    </main>
  </body>
</html>
