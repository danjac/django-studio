project_name:
    type: str
    help: Human-readable project name (e.g. "Photo Blog")
    validator: "{% if not project_name.strip() %}project_name cannot be empty{% endif %}"

project_slug:
    type: str
    help: Python identifier used as the project directory and module name
    default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"
    validator: "{% if not project_slug.strip() %}project_slug cannot be empty{% endif %}"

package_name:
    type: str
    help: Python package name (usually identical to project_slug)
    default: "{{ project_slug }}"

description:
    type: str
    help: Short project description
    default: "A Django project"

author:
    type: str
    help: Author full name
    default: "Your Name"

author_email:
    type: str
    help: Author email address
    default: "you@example.com"

domain:
    type: str
    help: Production domain (e.g. example.com)
    default: "example.com"

license:
    type: str
    help: Project license
    choices:
        - MIT
        - Apache-2.0
        - GPL-3.0
        - AGPL-3.0
        - LGPL-3.0
        - MPL-2.0
        - BSD-2-Clause
        - BSD-3-Clause
        - ISC
        - EUPL-1.2
        - None
    default: MIT

_subdirectory: template
_templates_suffix: .jinja

_tasks:
    - >-
        python "{{ _copier_conf.src_path }}/hooks/post_gen_project.py"
        "{{ project_slug }}"
        "{{ license }}"
        "{{ author }}"
