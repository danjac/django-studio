{% if not cookies_accepted %}
  {% with target="cookie-banner" %}
    <div
      class="fixed bottom-0 z-50 flex w-full justify-center bg-zinc-900 text-white opacity-90 dark:bg-zinc-800"
      id="{{ target }}"
    >
      <div class="flex w-full justify-center p-3 text-center md:w-3/4">
        <div class="space-y-3">
          <p class="font-semibold">
            This site uses cookies for essential features such as logins and
            security. We do not share cookies or any other user information with
            third parties. For more information, please see our
            <a href="{% url 'privacy' %}" class="underline">Privacy Policy</a>.
          </p>
          <div>
            <button
              class="btn btn-primary border border-white py-1 !px-6 text-base md:text-lg"
              aria-label="Accept cookies and close banner"
              hx-post="{% url 'accept_cookies' %}"
              hx-target="#{{ target }}"
              hx-push-url="false"
              hx-swap="delete"
            >Accept and close</button>
          </div>
        </div>
      </div>
    </div>
  {% endwith %}
{% endif %}
