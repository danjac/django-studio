<div
  id="messages"
  {% if hx_oob %}hx-swap-oob="true"{% endif %}
  class="fixed top-4 right-4 z-50 flex w-full max-w-sm flex-col gap-2"
>
  {% for message in messages %}
    <div
      x-data="{ show: true }"
      x-show="show"
      x-transition
      role="alert"
      class="message message-{{ message.tags }}"
    >
      <span>{{ message }}</span>
      <button
        @click="show = false"
        aria-label="Dismiss"
        class="ml-4 shrink-0 cursor-pointer opacity-60 hover:opacity-100"
      >&times;</button>
    </div>
  {% endfor %}
</div>
