{% load i18n static %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE }}">
  <head>
    {% block title %}{% title_tag %}{% endblock title %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% meta_tags %}
    <link rel="manifest" href="{% url 'manifest' %}">
    <link rel="stylesheet" href="{% static 'app.css' %}" />
    <script src="{% static 'vendor/htmx-2.0.8.min.js' %}" defer></script>
    <script src="{% static 'vendor/alpine-3.15.2.min.js' %}" defer></script>
  </head>
  <body>
    <div id="hx-indicator" x-data="hxIndicator"></div>
    {% include "messages.html" %}
    {% cookie_banner %}
    {% include "navbar.html" %}
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      {% block content %}
      {% endblock content %}
    </main>
    {% block scripts %}
    <script>
      document.addEventListener('alpine:init', () => {
        Alpine.data('hxIndicator', () => ({
          width: 0,
          init() {
            setInterval(() => {
              if (this.$el.classList.contains('htmx-request')) {
                this.width = this.width + (Math.random() / 100) + 1;
                this.width = this.width > 30 ? -30 : this.width;
              } else {
                this.width = 0;
              }
              this.$el.style.width = this.width > 0 ? `${10 + this.width * 90}%` : '0px';
            }, 36);
          },
        }));
      });
    </script>
    <script>
      if (typeof navigator.serviceWorker !== 'undefined') {
        navigator.serviceWorker.register('{% static "service-worker.js" %}')
      }
    </script>
    {% endblock scripts %}
  </body>
</html>
