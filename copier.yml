  Opinionated Django project scaffolding
  https://github.com/danjac/django-studio

project_name:
    type: str
    help: Human-readable project name (e.g. "Photo Blog")
    validator: "{% if not project_name.strip() %}project_name cannot be empty{% endif %}"

project_slug:
    type: str
    help: Python identifier used as the project directory and module name
    default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"
    validator: "{% if not project_slug.strip() %}project_slug cannot be empty{% endif %}"

package_name:
    type: str
    help: Python package name (usually identical to project_slug)
    default: "{{ project_slug }}"

description:
    type: str
    help: Short project description
    default: "A Django project"

author:
    type: str
    help: Author full name
    default: "Your Name"

author_email:
    type: str
    help: Author email address
    default: "you@example.com"

domain:
    type: str
    help: Production domain (e.g. example.com)
    default: "example.com"

license:
    type: str
    help: Project license
    choices:
        - MIT
        - Apache-2.0
        - GPL-3.0
        - AGPL-3.0
        - LGPL-3.0
        - MPL-2.0
        - BSD-2-Clause
        - BSD-3-Clause
        - ISC
        - EUPL-1.2
        - None
    default: MIT

_message_after_copy: |2
  {{ '\x1b[38;5;72m\x1b[1m' }}Your project is ready!{{ '\x1b[0m' }} Next steps:

    {{ '\x1b[1m' }}1. Start Docker services{{ '\x1b[0m' }}
       just start

    {{ '\x1b[1m' }}2. Install dependencies and set up your environment{{ '\x1b[0m' }}
       just install

    {{ '\x1b[1m' }}3. Create and apply the initial database migration{{ '\x1b[0m' }}
       just dj makemigrations
       just dj migrate

    {{ '\x1b[1m' }}4. Run all unit and e2e tests, linters and type checks{{ '\x1b[0m' }}
       just check-all

    {{ '\x1b[1m' }}5. Set up the default site{{ '\x1b[0m' }}
       just dj set_default_site localhost:8000 "{{ project_name }}"

    {{ '\x1b[1m' }}6. Create a superuser{{ '\x1b[0m' }}
       just dj createsuperuser

  Using an agent, such as Claude Code? Run {{ '\x1b[1m' }}/dj-feedback{{ '\x1b[0m' }} to report issues or {{ '\x1b[1m' }}/dj-sync{{ '\x1b[0m' }} to pull template updates.

_subdirectory: template
_templates_suffix: .jinja

_tasks:
    - >-
        python "{{ _copier_conf.src_path }}/hooks/post_gen_project.py"
        "{{ project_slug }}"
        "{{ license }}"
        "{{ author }}"
